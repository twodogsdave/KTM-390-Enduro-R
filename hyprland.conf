# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

general {
    col.active_border = rgb(706e5e)
    col.inactive_border = rgb(171717)
    border_size = 3
    gaps_in = 5
    gaps_out = 5
}

group {
    col.border_active = rgba(706e5eee)
    col.border_inactive = rgb(171717)

    groupbar {
        col.active = rgba(706e5e99)
        col.inactive = rgba(17171788)
        text_color = rgb(F25623)
        text_color_inactive = rgba(88A57Dee)
    }
}


decoration {
  rounding = 4
  rounding_power = 3
  shadow {
  enabled = yes
  render_power = 8
  range = 8
  color = rgba(22,22,22, 0.5)
  }
}